apiVersion: v1
kind: Namespace
metadata:
  name: clawguard
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: clawguard
  namespace: clawguard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: clawguard
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: clawguard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: clawguard
subjects:
  - kind: ServiceAccount
    name: clawguard
    namespace: clawguard
